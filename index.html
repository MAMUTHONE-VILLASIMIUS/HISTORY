historyHTML:`
    <h3>Le Origini: Tra Civiltà Nuragica e Culti Ancestrali</h3>
    <p>Le origini dei Mamuthones sono avvolte nel mistero a causa della totale assenza di fontes scritte millenarie. Tuttavia, gli archeologi e gli antropologi concordano nel collocare la nascita di questo rito in epoca protostorica, presumibilmente durante la civiltà nuragica (o addirittura pre-nuragica).</p>
    <p>La sfilata non nasce come uno spettacolo di Carnevale, ma come un rito sacro e drammatico strettamente legato alla vita agropastorale dell'interno della Sardegna.</p>

    <h3>Le Tre Ipotesi Storiche Principali</h3>
    <p>Nel corso degli anni, gli studiosi hanno formulato diverse teorie per spiegare la nascita e il significato originale di queste figure:</p>
    
    <h4>1. Il Culto Dionisiaco e la Rigenerazione della Natura (La tesi più accreditata)</h4>
    <p>La teoria più solida inserisce i Mamuthones all'interno dei grandi riti dionisiaci del Mediterraneo antico. In questa chiave, il Mamuthone rappresenta una divinità sotterranea o un demone della vegetazione.</p>
    <ul>
        <li><strong>Il significato:</strong> Il rito serviva a celebrare la morte e la rinascita della natura alla fine dell'inverno.</li>
        <li><strong>I campanacci:</strong> Il frastuono cupo e ossessivo dei 30 kg di campane scosse all'unisono non era musica, ma un atto magico ed esorcistico (apotropaico) per scacciare gli spiriti del male dal villaggio e risvegliare la terra dal torpore invernale, propiziando la fertilità dei campi e del bestiame.</li>
    </ul>

    <h4>2. Il Totemismo e il Culto del Toro</h4>
    <p>Un'altra linea di ricerca lega la maschera al culto del bue o del toro, divinità centrale nelle religioni preistoriche sarde (simbolo di forza e fecondità). L'andatura dei Mamuthones — lenta, pesante, con la testa china e il corpo piegato in avanti sotto il peso del carico — mimerebbe proprio il passo faticoso dell'animale da lavoro o del bestiame nei campi.</p>

    <h4>3. La Vittoria sui Mori (La leggenda popolare)</h4>
    <p>Esiste una spiegazione storica di matrice puramente popolare, tramandata oralmente nei secoli, che vede nella sfilata la celebrazione della vittoria dei pastori della Barbagia... contro gli invasori Saraceni (i Mori).</p>
    <p>Secondo questa lettura, i Mamuthones (con il volto nero e i vestiti scuri) non sarebbero altro che i prigionieri arabi catturati, caricati di pesanti campane per essere derisi e fatti sfilare in catene sotto il controllo degli Issohadores (i vincitori sardi, vestiti con la giubba rossa). Sebbene affascinante, questa tesi è considerata dagli storici una reinterpretazione successiva di un rito molto più antico.</p>

    <h3>La Conservazione nei Secoli</h3>
    <p>Come ha fatto questo rito pre-cristiano a sopravvivere fino a oggi? La risposta sta nell'isolamento geografico e culturale della Barbagia. Durante la dominazione romana, bizantina e successivamente spagnola, l'interno della Sardegna ha opposto una strenua resistenza all'assimilazione culturale. Anche quando il Cristianesimo si è imposto nella regione, non è riuscito a cancellare queste pratiche pagane. La Chiesa ha quindi attuato un processo di sincretismo religioso: il rito agrario e primordiale è stato tollerato e "agganciato" alle festività del calendario cristiano.</p>
    <p>Per questo motivo, ancora oggi, la prima uscita ufficiale dei Mamuthones non avviene a Carnevale, ma la notte tra il 16 e il 17 gennaio, in occasione della festa di Sant'Antonio Abate (il Santo legato al fuoco e alla protezione del bestiame).</p>

    <h3>L'Epoca Moderna e la Codificazione</h3>
    <p>Fino alla prima metà del Novecento, il rito era un evento intimo, rurale e di esclusivo consumo comunitario, tramandato rigidamente da una "confraternita" spontanea di pastori e contadini di Mamoiada che custodivano i segreti del passo e la manifattura delle maschere.</p>
    <p>A partire dagli anni '50 e '60, e in modo definitivo negli anni '70, i Mamuthones sono usciti dai confini del paese. L'interesse di etnologi, antropologi e del turismo di massa ha trasformato questa danza rituale da evento folkloristico locale a uno dei simboli identitari più potenti della Sardegna nel mondo, pur riuscendo a mantenere inalterata la severità, il mistero e la sacralità del passo original.</p>

    <h3>I Dettagli del Costume</h3>
    
    <h4>1. La Visera (La Maschera)</h4>
    <p>È l'elemento centrale che cancella l'identità di chi la indossa. Viene intagliata rigorosamente a mano in legni teneri locali, principalmente fico, ontano o pero selvatico. La scelta del legno leggero è fondamentale per permettere al portatore di sopportare il calore e lo sforzo. È dipinta interamente di nero. I tratti somatici sono marcati, grotteschi e asimmetrici. Esprime una sofferenza profonda, una compostezza tragica e un'assoluta fissità dello sguardo.</p>

    <h4>2. Il Copricapo (Su Mucadore e La Berrita)</h4>
    <p>La testa del Mamuthone è completamente avvolta per nascondere capelli e collo. Su Mucadore è un fazzoletto di colore scuro (marrone o nero), storicamente rubato al vestiario femminile tradizionale sardo. Viene legato stretto sotto il mento per incorniciare la maschera e tenerla ferma sul viso. La Berrita è il classico berretto sardo in panno nero, che viene calzato sopra il fazzoletto.</p>

    <h4>3. L'Abbigliamento (La Mastruca)</h4>
    <p>Il corpo è coperto da indumenti che richiamano immediatamente il mondo pastorale e animale. La Mastruca è una giacca smanicata, lunga fin sotto il bacino, realizzata in pelle di pecora nera o scura (vengono evitate le pelli bianche, lasciate agli Issohadores). La lana è lunga, grezza e rivolta verso l'esterno. Sotto la mastruca, il Mamuthone indossa il classico abito tradizionale sardo in velluto scuro, completato da robusti scarponi in pelle.</p>

    <h4>4. La Carica dei Campanacci (Sa Carriga)</h4>
    <p>È l'elemento più iconico, faticoso e pesante del costume. Una "carica" completa pesa complessivamente tra i 25 e i 30 kg ed è divisa in due parti: i Campanacci sulla schiena (Sos Sonaggios), ossia una serie di grandi campane di bronzo e ferro battuto (solitamente tra le 30 e le 40 campane di dimensioni decrescenti), disposte a grappolo sul dorso, assicurate alle spalle tramite robuste cinghie di cuoio; e le Campanelle sul petto (Sa Trebba o Bronzeos), una serie di campane più piccole in bronzo o ottone appese sul davanti. Durante il salto, producono un suono acuto che si intreccia con il rimbombo cupo delle campane sulla schiena.</p>`

historyHTML:`
    <h3>The Origins: Between Nuragic Civilization and Ancestral Cults</h3>
    <p>The origins of the Mamuthones are shrouded in mystery due to the total absence of ancient written sources. However, archaeologists and anthropologists agree on placing the birth of this ritual in protohistoric times, presumably during the Nuragic civilization (or even pre-Nuragic).</p>
    <p>The parade did not originate as a Carnival show, but as a sacred and dramatic ritual closely linked to the agro-pastoral life of inland Sardinia.</p>

    <h3>The Three Main Historical Hypotheses</h3>
    <p>Over the years, scholars have formulated different theories to explain the origin and original meaning of these figures:</p>
    
    <h4>1. The Dionysian Cult and the Regeneration of Nature (The most accepted theory)</h4>
    <p>The most solid theory places the Mamuthones within the great Dionysian rituals of the ancient Mediterranean. In this key, the Mamuthone represents an underground deity or a demon of vegetation.</p>
    <ul>
        <li><strong>The meaning:</strong> The ritual served to celebrate the death and rebirth of nature at the end of winter.</li>
        <li><strong>The cowbells:</strong> The dark and obsessive din of the 30 kg of bells shaken in unison was not music, but a magical and exorcistic (apotropaic) act to drive away evil spirits from the village and awaken the earth from winter torpor, propitiating the fertility of fields and livestock.</li>
    </ul>

    <h4>2. Totemism and the Cult of the Bull</h4>
    <p>Another line of research links the mask to the cult of the ox or bull, a central deity in Sardinian prehistoric religions (symbol of strength and fecundity). The gait of the Mamuthones — slow, heavy, with bowed head and body bent forward under the weight of the load — closely mimics the heavy step of the working animal or livestock in the fields.</p>

    <h4>3. The Victory over the Moors (The popular legend)</h4>
    <p>There is a historical explanation of purely popular nature, passed down orally through the centuries, which sees the parade as a celebration of the victory of Barbagia shepherds against the Saracen invaders (the Moors).</p>
    <p>According to this reading, the Mamuthones (with their black faces and dark clothes) are none other than captured Arab prisoners, loaded with heavy bells to be mocked and paraded in chains under the control of the Issohadores (the Sardinian victors, dressed in red jackets). Although fascinating, this thesis is considered by historians to be a later reinterpretation of a much older ritual.</p>

    <h3>Preservation Through the Centuries</h3>
    <p>How did this pre-Christian ritual manage to survive to this day? The answer lies in the geographical and cultural isolation of Barbagia. During Roman, Byzantine, and later Spanish domination, the interior of Sardinia fiercely resisted cultural assimilation. Even when Christianity established itself in the region, it could not erase these pagan practices. The Church therefore implemented a process of religious syncretism: the agrarian and primordial ritual was tolerated and linked to the festivities of the Christian calendar.</p>
    <p>For this reason, even today, the first official appearance of the Mamuthones does not take place at Carnival, but on the night between January 16 and 17, on the occasion of the feast of Saint Anthony Abbot (the Saint linked to fire and the protection of livestock).</p>

    <h3>The Modern Era and Codification</h3>
    <p>Until the first half of the twentieth century, the ritual was an intimate, rural, and exclusively community event, rigidly handed down by a spontaneous "brotherhood" of shepherds and farmers from Mamoiada who guarded the secrets of the step and the manufacture of masks.</p>
    <p>Starting from the 1950s and 1960s, and definitively in the 1970s, the Mamuthones emerged beyond the town borders. The interest of ethnologists, anthropologists, and mass tourism transformed this ritual dance from a local folklore event into one of the most powerful identity symbols of Sardinia in the world, while managing to maintain the unaltered severity, mystery, and sacredness of the original step.</p>

    <h3>The Details of the Costume</h3>
    
    <h4>1. The Visera (The Mask)</h4>
    <p>It is the central element that erases the identity of the wearer. It is carved strictly by hand from local soft woods, mainly fig, alder, or wild pear. The choice of light wood is essential to allow the wearer to endure the heat and effort. It is painted entirely black. The facial features are sharp, grotesque, and asymmetrical. It expresses deep suffering, a tragic composure, and an absolute fixity of gaze.</p>

    <h4>2. The Headwear (Su Mucadore and La Berrita)</h4>
    <p>The head of the Mamuthone is completely wrapped to hide hair and neck. Su Mucadore is a dark-colored handkerchief (brown or black), historically borrowed from traditional Sardinian women's clothing. It is tied tightly under the chin to frame the mask and hold it firm on the face. La Berrita is the classic Sardinian black cloth cap, worn over the handkerchief.</p>

    <h4>3. The Clothing (La Mastruca)</h4>
    <p>The body is covered with garments that immediately recall the pastoral and animal world. The Mastruca is a sleeveless jacket, reaching down below the pelvis, made of black or dark sheepskin (white skins are avoided, being left to the Issohadores). The wool is long, coarse, and faces outwards. Under the mastruca, the Mamuthone wears the classic traditional Sardinian dark velvet suit, completed by sturdy leather boots.</p>

    <h4>4. The Charge of the Bells (Sa Carriga)</h4>
    <p>It is the most iconic, tiring, and heavy element of the costume. A complete "charge" weighs between 25 and 30 kg in total and is divided into two parts: the back cowbells (Sos Sonaggios), a series of large bronze and wrought iron bells (usually between 30 and 40 bells of decreasing sizes) arranged in a cluster on the back, secured to the shoulders by a robust system of leather straps; and the chest bells (Sa Trebba or Bronzeos), a series of much smaller bells made of bronze or brass hung on the front. During the jump, these chest bells produce a higher pitched sound that intertwines with the deep rumble of the back bells.</p>`
},

historyHTML:`
    <h3>Les Origines : Entre Civilisation Nuragique et Cultes Ancestraux</h3>
    <p>Les origines des Mamuthones sont entourées de mystère en raison de l'absence totale de sources écrites millénaires. Cependant, les archéologues et les anthropologues s'accordent à situer la naissance de ce rite à l'époque protohistorique, probablement pendant la civilisation nuragique (ou même pré-nuragique).</p>
    <p>Le défilé n'est pas né comme un spectacle de Carnaval, mais comme un rite sacré et dramatique étroitement lié à la vie agro-pastorale de l'intérieur de la Sardaigne.</p>

    <h3>Les Trois Principales Hypothèses Historiques</h3>
    <p>Au fil des ans, les chercheurs ont formulé différentes théories pour expliquer l'origine et la signification originale de ces figures :</p>
    
    <h4>1. Le Culte Dionysiaque et la Régénération de la Nature (La thèse la plus acceptée)</h4>
    <p>La théorie la plus solide insère les Mamuthones au sein des grands rites dionisiaques de la Méditerranée antique. Dans cette optique, le Mamuthone représente une divinité souterraine ou un démon de la végétation.</p>
    <ul>
        <li><strong>La signification :</strong> Le rite servait à célébrer la mort et la renaissance de la nature à la fin de l'hiver.</li>
        <li><strong>Les cloches :</strong> Le fracas sombre et obsessionnel des 30 kg de cloches secouées à l'unisson n'était pas de la musique, mais un acte magique et exorciste (apotropaïque) pour chasser les mauvais esprits du village et réveiller la terre, favorisant la fertilité des champs et du bétail.</li>
    </ul>

    <h4>2. Le Totémisme et le Culte du Taureau</h4>
    <p>Une autre ligne de recherche lie le masque au culte du bœuf ou du taureau, divinité centrale dans les religions préhistoriques sardes (symbole de force et de fécondité). La démarche des Mamuthones — lente, lourde, tête baissée et corps penché en avant sous le poids de la charge — imite le pas fatigué de l'animal de travail dans les champs.</p>

    <h4>3. La Victoire sur les Maures (La légende populaire)</h4>
    <p>Il existe une explication populaire, transmise oralement au cours des siècles, qui voit dans le défilé la célébration de la victoire des bergers de la Barbagia contre les envahisseurs sarrasins (les Maures).</p>
    <p>Selon cette lecture, les Mamuthones (au visage noir et vêtements sombres) seraient les prisonniers arabes capturés, chargés de lourdes cloches pour être ridiculisés et contraints de défiler enchaînés sous le contrôle des Issohadores (les vainqueurs sardes, vêtus d'une veste rouge). Bien que fascinante, cette thèse est considérée par les historiens comme une réinterprétation tardive d'un rite beaucoup plus ancien.</p>

    <h3>La Conservation à travers les Siècles</h3>
    <p>Comment ce rite préchrétien a-t-il pu survivre jusqu'à aujourd'hui ? La réponse réside dans l'isolement géographique et culturel de la Barbagia. Pendant les dominations romaine, byzantine puis espagnole, l'intérieur de la Sardaigne a opposé une farouche résistance à l'assimilation culturelle. Même lorsque le christianisme s'est imposé, il n'a pas pu effacer ces pratiques païennes. L'Église a donc mis en œuvre un processus de syncrétisme religieux : le rite agraire a été toléré et rattaché aux festivités du calendrier chrétien. C'est pourquoi la première sortie officielle des Mamuthones a lieu la nuit du 16 au 17 janvier, pour la fête de Saint Antoine Abbé.</p>

    <h3>L'Époque Moderne et la Codification</h3>
    <p>Jusqu'à la première moitié du XXe siècle, le rite était un événement intime, rural et communautaire, transmis rigidement par une confrérie spontanée de bergers et de paysans de Mamoiada qui gardaient les secrets du pas et la fabrication des masques. À partir des années 50, et définitivement dans les années 70, l'intérêt des ethnologues et du tourisme de masse a transformé cette danse en un symbole identitaire de la Sardaigne dans le monde, tout en préservant le mystère et la sacralité du pas original.</p>

    <h3>Les Détails du Costume</h3>
    
    <h4>1. La Visera (Le Masque)</h4>
    <p>C'est l'élément central qui efface l'identité de celui qui le porte. Il est taillé à la main dans des bois tendres locaux (figuier, aune ou poirier sauvage). Peint entièrement en noir, ses traits asymétriques expriment une souffrance profonde, une dignité tragique et une fixité absolue du regard.</p>

    <h4>2. Le Couvre-chef (Su Mucadore et La Berrita)</h4>
    <p>La tête est enveloppée pour cacher les cheveux et le cou. Su Mucadore est un foulard sombre noué sous le menton, historiquement emprunté aux vêtements féminins traditionnels. La Berrita est le bonnet sarde classique en drap noir, porté par-dessus le foulard.</p>

    <h4>3. Les Vêtements (La Mastruca)</h4>
    <p>Le corps est couvert par La Mastruca, une veste sans manches en peau de mouton noire ou sombre (les peaux blanches sont laissées aux Issohadores) avec la laine longue tournée vers l'extérieur, portée sur le costume traditionnel en velours sombre et des bottes en cuir.</p>

    <h4>4. La Charge de Cloches (Sa Carriga)</h4>
    <p>Une charge lourde entre 25 et 30 kg divisée entre de grandes cloches sur le dos (Sos Sonaggios) attachées par de solides courroies de cuir, et des clochettes plus petites en bronze sur la poitrine (Sa Trebba).</p>`
},

historyHTML:`
    <h3>Los Orígenes: Entre la Civilización Nurágica y Cultos Ancestrales</h3>
    <p>Los orígenes de los Mamuthones están envueltos en el misterio debido a la total ausencia de fuentes escritas milenarias. Sin embargo, arqueólogos y antropólogos coinciden en situar el nacimiento de este rito en la época protohistórica, presuntamente durante la civilización nurágica (o incluso pre-nurágica).</p>
    <p>El desfile no nació como un espectáculo de Carnaval, sino como un rito sagrado y dramático estrechamente ligado a la vida agropastoril del interior de Cerdeña.</p>

    <h3>Las Tres Principales Hipótesis Históricas</h3>
    <p>A lo largo de los años, los estudiosos han formulado diversas teorías para explicar el origen y el significado original de estas figuras:</p>
    
    <h4>1. El Culto Dionisíaco y la Regeneración de la Naturaleza (La tesis más aceptada)</h4>
    <p>La teoría más sólida inserta a los Mamuthones dentro de los grandes ritos dionisíacos del Mediterráneo antiguo. En esta clave, el Mamuthone representa una divinidad subterránea o un demonio de la vegetación.</p>
    <ul>
        <li><strong>El significado:</strong> El rito profesional servía para celebrar la muerte y el renacimiento de la naturaleza al final del invierno.</li>
        <li><strong>Los cencerros:</strong> El estruendo oscuro y obsesivo de los 30 kg de cencerros sacudidos al unísono no era música, sino un acto mágico y exorcista (apotropaico) para ahuyentar los espíritus malignos del pueblo y despertar la tierra, propiciando la fertilidad de los campos y del ganado.</li>
    </ul>

    <h4>2. El Totemismo y el Culto al Toro</h4>
    <p>Otra línea de investigación vincula la máscara al culto del buey o del toro, deidad central en las religiones prehistócesis sardas (símbolo de fuerza y fecundidad). El andar de los Mamuthones — lento, pesado, con la cabeza inclinada y el cuerpo doblado hacia adelante bajo el peso de la carga — imita el paso fatigado del animal de trabajo en los campos.</p>

    <h4>3. La Victoria sobre los Moros (La leyenda popular)</h4>
    <p>Existe una explicación popular, transmitida oralmente a lo largo de los siglos, que ve en el desfile la celebración de la victoria de los pastores de la Barbagia contra los invasores sarracenos (los moros).</p>
    <p>Según esta lectura, los Mamuthones (con el rostro negro y ropa oscura) serían los prisioneros árabes capturados, cargados de pesados cencerros para ser burlados y obligados a desfilar encadenados bajo el control de los Issohadores (los vencedores sardos, vestidos con chaqueta roja). Aunque fascinante, esta tesis es considerada por los historiadores como una reinterpretación posterior de un rito mucho más antiguo.</p>

    <h3>La Conservación a través de los Siglos</h3>
    <p>¿Cómo logró sobrevivir este rito precristiano hasta hoy? La respuesta está en el aislamiento geográfico y cultural de la Barbagia. Durante las dominaciones romana, bizantina y posteriormente española, el interior de Cerdeña opuso una feroz resistencia a la asimilación cultural. Incluso cuando el cristianismo se impuso en la región, no pudo borrar estas prácticas paganas. Por ello, la Iglesia llevó a cabo un proceso de sincretismo religioso: el rito agrario y primordial fue tolerado y vinculado al calendario cristiano. Así, la primera salida oficial ocurre la noche entre el 16 y 17 de enero, por San Antonio Abad (el Santo ligado al fuego y la protección del ganado).</p>

    <h3>La Época Moderna y la Codificación</h3>
    <p>Hasta la primera mitad del siglo XX, el rito era un evento íntimo y rural, transmitido rígidamente por una cofradía espontánea de pastores de Mamoiada que custodiaban los secretos del paso y la fabricación de máscaras. A partir de los años 50 y de manera definitiva en los 70, los Mamuthones salieron de las fronteras locales. El interés de etnólogos y del turismo de masas transformó esta danza ritual en uno de los símbolos identitarios más potentes de Cerdeña en el mundo, manteniendo intacta su sacralidad original.</p>

    <h3>Los Detalles del Traje</h3>
    
    <h4>1. La Visera (La Máscara)</h4>
    <p>Elemento central que borra la identidad de quien la usa. Tallada a mano en maderas blandas locales (higuera, aliso o peral silvestre). Pintada completamente de negro, sus rasgos marcados y asimétricos expresan un sufrimiento profundo, una compostura trágica y una fijeza absoluta en la mirada.</p>

    <h4>2. El Tocado (Su Mucadore y La Berrita)</h4>
    <p>La cabeza está completamente envuelta para ocultar cabello y cuello. Su Mucadore es un pañuelo oscuro (marrón o negro), históricamente tomado del traje femenino tradicional. Se ata bajo la barbilla para enmarcar la máscara. La Berrita es el gorro clásico sardo de paño negro, que se coloca sobre el pañuelo.</p>

    <h4>3. La Vestimenta (La Mastruca)</h4>
    <p>El cuerpo está cubierto por La Mastruca, una chaqueta sin mangas de piel de oveja negra o oscura (se evitan las pieles blancas, dejadas a los Issohadores). La lana es larga, gruesa y hacia afuera. Debajo lleva el clásico traje tradicional sardo de terciopelo oscuro con botas de cuero.</p>

    <h4>4. La Carga de Cencerros (Sa Carriga)</h4>
    <p>Una carga pesada de entre 25 y 30 kg dividida entre grandes cencerros en la espalda (Sos Sonaggios) sujetos con correas de cuero, y cencerros más pequeños de bronce en el pecho (Sa Trabba).</p>`
},

historyHTML:`
    <h3>Die Ursprünge: Zwischen Nuraghen-Zivilisation und Ahnenkulten</h3>
    <p>Die Ursprünge der Mamuthones sind aufgrund des völligen Fehlens jahrtausendealter schriftlicher Quellen geheimnisvoll. Archäologen und Anthropologen sind sich jedoch einig, dass dieses Ritual in der prähistorischen Epoche, vermutlich während der Nuraghen-Zivilisation (oder sogar vor-Nuraghen-Zeit), entstand.</p>
    <p>Der Umzug entstand nicht als Karnevalsshow, sondern als sakrales und dramatisches Ritual, das eng mit dem agrarisch-pastoralen Leben im Inneren Sardiniens verbunden ist.</p>

    <h3>Die drei historischen Haupttheorien</h3>
    <p>Im Laufe der Jahre haben Wissenschaftler verschiedene Theorien formuliert, um den Ursprung dieser Figuren zu erklären:</p>
    
    <h4>1. Der dionysische Kult und die Regeneration der Natur (Die anerkannteste Theorie)</h4>
    <p>Die solideste Theorie ordnet die Mamuthones in die großen dionysischen Rituale des antiken Mittelmeerraums ein. In dieser Interpretation stellt der Mamuthone eine unterirdische Gottheit oder einen Dämon der Vegetation dar.</p>
    <ul>
        <li><strong>Die Bedeutung:</strong> Das Ritual diente dazu, das Sterben und Wiedererwachen der Natur am Ende des Winters zu feiern.</li>
        <li><strong>Die Glocken:</strong> Der dumpfe und obsessive Lärm der 30 kg schweren, im Gleichschritt geschüttelten Glocken war keine Musik, sondern ein magischer, apotropäischer Akt, um böse Geister zu vertreiben, den Boden aus dem Winterschlaf zu wecken und die Fruchtbarkeit von Feldern und Vieh zu erbitten.</li>
    </ul>

    <h4>2. Totemismus und der Kult des Stiers</h4>
    <p>Ein weiterer Forschungsansatz verbindet die Maske mit dem Kult des Ochsen oder Stiers, einer zentralen Gottheit in den prähistorischen sardischen Religionen (Symbol für Stärke und Fruchtbarkeit). Der Gang der Mamuthones — langsam, schwer, mit gesenktem Kopf und nach vorne gebeugtem Körper unter der Last — ahmt den mühsamen Schritt des Arbeitstieres oder des Viehs auf den Feldern nach.</p>

    <h4>3. Der Sieg über die Mauren (Die Volkssage)</h4>
    <p>Es gibt eine rein populäre Erklärung, die im Laufe der Jahrhunderte mündlich überliefert wurde. Sie sieht im Umzug die Feier des Sieges der Hirten der Barbagia über die sarazenischen Invasoren (die Mauren).</p>
    <p>Nach dieser Lesart sind die Mamuthones (mit schwarzen Gesichtern und dunkler Kleidung) nichts anderes als gefangene arabische Gefangene, beladen mit schweren Glocken, um verspottet und in Ketten unter der Aufsicht der Issohadores (die sardischen Sieger in roten Jacken) vorgeführt zu werden. Historiker betrachten dies jedoch als spätere Neuinterpretation eines viel älteren Ritus.</p>

    <h3>Die Erhaltung durch die Jahrhunderte</h3>
    <p>Wie konnte dieses vorchristliche Ritual bis heute überleben? Die Antwort liegt in der geografischen und kulturellen Isolation der Barbagia. Während der römischen, byzantinischen und später spanischen Herrschaft leistete das Innere Sardiniens der kulturellen Assimilation erbitterten Widerstand. Die Kirche vollzog daher einen religiösen Synkretismus: Das agrarische und primordiale Ritual wurde toleriert und an christliche Feiertage gekoppelt. Aus diesem Grund findet der erste offizielle Auftritt in der Nacht vom 16. auf den 17. Januar zum Fest des heiligen Antonius des Einsiedlers statt.</p>

    <h3>Moderne Ära und die Codierung</h3>
    <p>Bis zur ersten Hälfte des 20. Jahrhunderts war das Ritual ein intimes Ereignis, das von einer Bruderschaft von Hirten aus Mamoiada bewahrt wurde, die die Geheimnisse des Schritts hüteten. Ab den 50er und 70er Jahren verwandelte der Tourismus diesen Tanz in ein Identitätssymbol Sardiniens in der Welt, ohne jedoch das Mysterium des ursprünglichen Ritus zu verlieren.</p>

    <h3>Die Details der Tracht</h3>
    
    <h4>1. Die Visera (Die Maske)</h4>
    <p>Das zentrale Element, das die Identität des Trägers auslöscht. Sie wird streng von Hand aus lokalen weichen Hölzern (Feige, Erle oder Wildbirne) geschnitzt. Ganz in Schwarz bemalt; die asymmetrischen Züge drücken tiefes Leiden und absolute Starre aus.</p>

    <h4>2. Die Kopfbedeckung (Su Mucadore und La Berrita)</h4>
    <p>Der Kopf ist vollständig umhüllt, um Haare und Hals zu verbergen. Su Mucadore ist ein dunkles Tuch, das eng unter dem Kinn gebunden wird. Darüber wird La Berrita getragen, die klassische sardische Mütze aus schwarzem Tuch.</p>

    <h4>3. Die Kleidung (La Mastruca)</h4>
    <p>Der Körper ist von La Mastruca bedeckt, einer Weste aus schwarzem Schaffell mit der Wolle nach außen. Darunter tragen sie den klassischen traditionellen sardischen Anzug aus dunklem Samt und robuste Lederstiefel.</p>

    <h4>4. Die Last der Glocken (Sa Carriga)</h4>
    <p>Eine schwere Last von 25 bis 30 kg, aufgeteilt in große Glocken auf dem Rücken (Sos Sonaggios) mit Lederriemen und kleinere Glocken aus Bronze auf der Brust (Sa Trebba).</p>`
},

historyHTML:`
    <h3>起源：努拉吉文明与祖先崇拜之间</h3>
    <p>由于缺乏千年前的文字记载，马穆托内斯（Mamuthones）的起源充满了神秘色彩。然而，考古学家和人类学家一致认为，这一仪式诞生于原史时代，大概是在努拉吉文明（甚至前努拉吉时期）。</p>
    <p>这场游行最初并非普通的狂欢节表演，而是一种与撒丁岛内陆农牧生活紧密相连的庄严神圣的祭祀仪式。</p>

    <h3>三大主要历史假说</h3>
    <p>传统上，学者们提出了不同的理论来解释这些形象的诞生和原始含义：</p>
    
    <h4>1. 酒神崇拜与自然复苏（最公认的理论）</h4>
    <p>该理论将马穆托内斯归入古代地中海的酒神节仪式。在这种解读下，马穆托内斯代表着地下神灵或植物之神。</p>
    <ul>
        <li><strong>核心含义：</strong> 该仪式用于在冬末庆祝大自然的死亡与新生。</li>
        <li><strong>负重牛铃：</strong> 同步摇晃重达30公斤牛铃所发出的低沉驱魔（辟邪）声，是为了驱走村庄里的恶灵，唤醒沉睡的土地，祈求田野和牲畜的丰收。</li>
    </ul>

    <h4>2. 图腾崇拜与公牛信仰</h4>
    <p>另一项研究将面具与公牛的崇拜联系在一起，公牛是撒丁岛史前宗教中代表力量与繁殖的核心神祇。马穆托内斯人缓慢、沉重、低头弓背的步伐，正是模仿了劳作牲畜在田间迈出的艰难步伐。</p>

    <h4>3. 战胜摩尔人（民间传说）</h4>
    <p>这是一个世代口耳相传的民间解释，认为游行是为了庆祝巴尔巴吉亚牧民战胜萨拉森侵略者（摩尔人）。根据这种解读，黑脸黑衣的马穆托内斯人代表被俘虏的阿拉伯囚犯，他们戴着沉重的铃铛在伊索哈多雷斯（身穿红衣的撒丁岛胜利者）的押解下成串示众。历史学家认为这是后世的重新解读。</p>

    <h3>几个世纪以来的保存</h3>
    <p>由于巴尔巴吉亚地理和文化上的孤立，这一仪式得以幸存。在罗马、拜占庭以及随后的西班牙统治期间，撒丁岛内陆对文化同化进行了顽强抵抗。即使在基督教确立之后，也未能抹去这些异教习俗。教会实行了宗教融合：容忍并调整了农业仪式，使其挂靠在基督教历法的节日上。因此，马穆托内斯人的首次官方出场是在1月16日至17日的圣安东尼节（与火和保护牲畜相关的圣人）。</p>

    <h3>现代与服装细节</h3>
    <p>直到20世纪上半叶，该仪式都是当地牧民兄弟会严格保留的内部活动。自1950年代起，大众旅游将这一舞蹈变成了撒丁岛最强大的身份标志之一。服装包括：</p>
    
    <h4>1. 面具 (La Visera)</h4>
    <p>手工雕刻自当地淡味木材（无花果、桤木或野梨）。涂成全黑色，不对称的线条表达了深沉的痛苦、悲剧性的沉着和绝对凝视的目光。</p>

    <h4>2. 头饰 (Su Mucadore 与 La Berrita)</h4>
    <p>头部被完全包裹。Su Mucadore 是传统的深色头巾，紧紧系在下巴下以固定面具。La Berrita 是经典的撒丁岛黑色呢帽，戴在头巾上方。</p>

    <h4>3. 羊皮外衣 (La Mastruca)</h4>
    <p>黑色或深色绵羊皮制成的无袖夹克（避免使用留给伊索哈多雷斯人的白色皮革），羊毛朝外。内穿深色天鹅绒撒丁传统服装和皮靴。</p>

    <h4>4. 负重牛铃 (Sa Carriga)</h4>
    <p>背部的大铃铛（Sos Sonaggios）与胸前的小铃铛（Sa Trebba）共重25-30公斤。跳跃时，它们会发出沉闷而有力的轰鸣声。</p>`
},

    <p>Вырезается вручную из мягкого дерева (инжир, ольха), окрашена в черный цвет. Асимметричные черты выражают глубокое страдание и абсолютную неподвижность взгляда.</p>

    <h4>2. Головной убор (Su Mucadore и La Berrita)</h4>
    <p>Голова полностью обернута платком Su Mucadore, завязанным под подбородком. Сверху надевается La Berrita — традиционная сардинская шапка из черного сукна.</p>

    <h4>3. Одежда (La Mastruca)</h4>
    <p>Тело покрыто жилетом из темной овчины (La Mastruca) шерстью наружу, который надевается поверх традиционного костюма из темного бархата с кожаными сапогами.</p>

    <h3>الأصول: بين الحضارة النوراجية والطقوس القديمة</h3>
    <p>تعتبر أصول طقوس الماموثونيس غامضة بسبب الغياب التام للمصادر المكتوبة القديمة. ومع ذلك، يجمع علماء الآثار والأنثروبولوجيا على إرجاع نشأة هذا الطقس إلى عصر ما قبل التاريخ، ويُعتقد أنه يعود إلى الحضارة النوراجية (أو حتى ما قبل النوراجية).</p>
    <p>ولم يظهر هذا الموكب كعرض كرفالي، بل كطقس ديني ودرامي يرتبط ارتباطاً وثيقاً بالحياة الرعوية والزراعية في قلب سردينيا.</p>

    <h3>الفرضيات التاريخية الثلاث الرئيسية</h3>
    <p>على مر السنين، صاغ الباحثون نظريات مختلفة لشرح أصل ومعنى هذه الشخصيات:</p>
    
    <h4>1. العبادة الديوانيسية وتجدد الطبيعة (النظرية الأكثر قبولاً)</h4>
    <p>تدرج هذه النظرية طقس الماموثونيس ضمن الطقوس الديوانيسية الكبرى في البحر الأبيض المتوسط القديم. يمثل الماموثوني هنا إلهًا سفليًا أو شيطانًا للنباتات.</p>
    <ul>
        <li><strong>المعنى:</strong> كان الطقس يهدف للاحتفال بموت الطبيعة وبعثها في نهاية الشتاء.</li>
        <li><strong>الأجراس:</strong> لم يكن الضجيج الصاخب لـ 30 كجم من الأجراس موسيقى، بل عملاً سحرياً وطارداً للأرواح الشريرة ولإيقاظ الأرض من سباتها الشتوي، مما يحفز خصوبة الحقول والماشية.</li>
    </ul>

    <h4>2. الطوطمية وعبادة الثور</h4>
    <p>تربط أبحاث أخرى القناع بعبادة الثور، وهو رمز القوة والخصوبة في ديانات ما قبل التاريخ في سردينيا. وتماثل مشية الماموثونيس — البطيئة والثقيلة مع انحناء الرأس والجسم للأمام تحت وطأة الحمل — خطى حيوانات العمل الشاقة في الحقول.</p>

    <h4>3. الانتصار على الموريسكيين (الأسطورة الشعبية)</h4>
    <p>هناك تفسير شعبي يرى في الموكب احتفالاً بانتصار رعاة منطقة بارباجيا على الغزاة السراسنة (المور). ويمثل الماموثونيس ذوو الوجوه السوداء الأسرى العرب المقيدين بالسلاسل تحت سيطرة "الإيسوهادوريس" (المنتصرون السردينيون). ويعتبر المؤرخون هذا التفسير إعادة قراءة متأخرة للطقس.</p>

    <h3>الحفاظ عليه عبر القرون</h3>
    <p>نجا الطقس بفضل العزلة الجغرافية والثقافية لمنطقة بارباجيا. وعندما فرضت المسيحية نفسها، لم تستطع محو هذه الممارسات الوثنية، فتبنت الكنيسة عملية التوفيق الديني: تم التسامح مع الطقس الزراعي وربطه بالتقويم المسيحي. ولهذا السبب، فإن أول خروج رسمي للماموثونيس يحدث في ليلة 16-17 يناير بمناسبة عيد القديس أنطونيوس الكبير.</p>

    <h3>تفاصيل الزي التقليدي</h3>
    
    <h4>1. القناع (La Visera)</h4>
    <p>منحوت يدوياً من الأخشاب المحلية الخفيفة (تين، غبيراء)، ومطلي باللون الأسود الكامل، ويعبر عن معاناة عميقة ونظرة ثابتة تماماً.</p>

    <h4>2. غطاء الرأس (Su Mucadore و La Berrita)</h4>
    <p>يتم لف الرأس بالكامل لإخفاء الشعر والرقبة بواسطة Su Mucadore وهو وشاح داكن يربط تحت الذقن، وتوضع فوقه La Berrita وهي القبعة السردينية التقليدية.</p>

    <h4>3. الملابس (La Mastruca)</h4>
    <p>يغطي الجسم سترة بدون أكمام من جلد الغنم الداكن (La Mastruca) مع توجيه الصوف للخارج، ترتدى فوق زي مخملي داكن.</p>

    <h4>4. حمل الأجراس (Sa Carriga)</h4>
    <p>حمل ثقيل يزن ما بين 25 و 30 كجم، ينقسم بين أجراس كبيرة على الظهر (Sos Sonaggios) مربوطة بأحزمة جلدية وأجراس أصغر على الصدر (Sa Trebba).</p>`
}

const langCodes = {
    it: 'it-IT',
    en: 'en-US',
    fr: 'fr-FR',
    es: 'es-ES',
    de: 'de-DE',
    zh: 'zh-CN',
    ru: 'ru-RU',
    ar: 'ar-SA'
};

function setLanguage(lang){
    currentLang = lang;
    const mainContent = document.getElementById("mainContent");
    
    if (lang === 'ar') {
        mainContent.classList.add('rtl');
    } else {
        mainContent.classList.remove('rtl');
    }
    
    document.getElementById("title").innerText = translations[lang].title;
    document.getElementById("subtitle").innerText = translations[lang].subtitle;
    document.getElementById("donationMessage").innerText = translations[lang].donationMessage;
    document.getElementById("paypalBtn").innerText = translations[lang].paypalBtn;
    document.getElementById("audioBtn").innerText = translations[lang].audioBtn;
    document.getElementById("historyTitle").innerText = translations[lang].historyTitle;
    document.getElementById("historyText").innerHTML = translations[lang].historyHTML;
}

function speakText(){
    window.speechSynthesis.cancel(); 
    const text = document.getElementById("historyText").innerText;
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = langCodes[currentLang];
    window.speechSynthesis.speak(speech);
}

// Inizializzazione automatica all'avvio in Italiano
setLanguage('it');
</script>
